<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Song Guesser</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%231DB954'/><path d='M28 38c12-4 28-4 44 4M28 50c10-3 24-3 38 3M28 62c8-2 18-2 30 2' stroke='white' stroke-width='7' stroke-linecap='round' fill='none'/></svg>">
</head>

<body>
    <button id="logout-btn" class="hidden" title="Log out">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
            <path d="M16 13v-2H7V8l-5 4 5 4v-3z" />
            <path d="M20 3h-9a2 2 0 0 0-2 2v4h2V5h9v14h-9v-4H9v4a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z" />
        </svg>
        Logout
    </button>

    <div class="container">
        <h1>Spotify Song Guesser</h1>

        <div id="auth-section">
            <button id="login-btn">Login with Spotify</button>
        </div>

        <div id="game-section" class="hidden">
            <button id="reveal-btn" class="hidden">
                <span class="btn-text">Reveal Song</span>
                <span class="btn-dots" aria-hidden="true">
                    <span class="dot">●</span>
                    <span class="dot">●</span>
                    <span class="dot">●</span>
                </span>
            </button>

            <!-- Square song card with blurred cover background -->
            <div id="song-info" class="hidden">
                <div id="song-card">
                    <div id="card-bg"></div>
                    <div id="card-content">
                        <div class="artist-features">
                            <span id="artist"></span>
                        </div>
                        <div class="year" id="year"></div>
                        <div class="song-name" id="song-name"></div>
                    </div>
                </div>

                <!-- Playback controls bar -->
                <div id="controls-bar">
                    <button class="ctrl-btn" id="restart-btn" title="Restart song">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24"
                            height="24">
                            <path
                                d="M12 5V2L8 6l4 4V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z" />
                        </svg>
                    </button>
                    <button class="ctrl-btn ctrl-main" id="playpause-btn" title="Play / Pause">
                        <!-- Filled dynamically by JS -->
                        <svg id="play-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                            width="28" height="28">
                            <path d="M8 5v14l11-7z" />
                        </svg>
                        <svg id="pause-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                            width="28" height="28" class="hidden">
                            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                        </svg>
                    </button>
                    <button class="ctrl-btn skip-btn" id="skip-btn" title="Skip to next song">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24"
                            height="24">
                            <path d="M6 18V6l8.5 6L6 18zm8.5 0V6H17v12h-2.5z" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <span id="status" class="corner-label corner-bl">Waiting for song to play...</span>
        <span class="note corner-label corner-br">V2.18</span>
    </div>

    <script src="app.js"></script>
</body>

</html>
